name: Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend-api image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: packages/backend-api/Dockerfile
          push: false
          tags: vederi-alert-flow-backend-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend-persistence image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: packages/backend-persistence/Dockerfile
          push: false
          tags: vederi-alert-flow-backend-persistence:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend-notification image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: packages/backend-notification/Dockerfile
          push: false
          tags: vederi-alert-flow-backend-notification:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./packages/frontend
          push: false
          tags: vederi-alert-flow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker compose build
        run: |
          docker compose --env-file .env.dev build
