services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
      POSTGRES_DB: ${DB_NAME:-vederi}
    ports:
      - "${DB_PORT:-5438}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend-api:
    build:
      context: .
      dockerfile: packages/backend-api/Dockerfile
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-3001}:3000"
    depends_on:
      db:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  backend-persistence:
    build:
      context: .
      dockerfile: packages/backend-persistence/Dockerfile
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
    depends_on:
      db:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  backend-notification:
    build:
      context: .
      dockerfile: packages/backend-notification/Dockerfile
    env_file:
      - .env.dev
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend-api:3000
    ports:
      - "80:80"
    depends_on:
      - backend-api

volumes:
  db_data:
  redis_data:
